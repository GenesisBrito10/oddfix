appId: com.oddfix.desktop
productName: OddFix
copyright: © OddFix

directories:
  output: dist-electron
  buildResources: build

# Ship ONLY the Electron runtime files (+ pruned prod deps via electron-builder).
# The whole Nuxt UI + Nitro server is shipped as a resource (see extraResources).
files:
  - electron/**/*
  - package.json

# The built Nuxt app (.output) — Nitro node server + public assets. Electron's
# main process boots .output/server/index.mjs on a local port (keeps the API proxy).
extraResources:
  - from: .output
    to: output
    filter:
      - "**/*"

asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: nsis-web
      arch:
        - x64

# Full offline installer (escolhe pasta).
nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: OddFix

# Web installer: .exe pequeno que baixa o payload (.7z) do GitHub Release e instala.
# Um clique = baixa + instala automático (herda ícone/config do nsis acima).
nsisWeb:
  # Nome SEM versão -> link permanente releases/latest/download/OddFix-Web-Setup.exe
  artifactName: ${productName}-Web-Setup.${ext}
  # Assistido (NÃO oneClick): mostra boas-vindas, progresso do download/instalação e a
  # tela final "concluído" com opção de abrir — mantém o usuário informado o tempo todo.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  runAfterFinish: true

# Auto-update source: our own domain (generic). app-update.yml ships this URL — NOT
# the GitHub repo. Repo can stay private; the backend serves /downloads. The CI uploads
# the artifacts (electron-builder does not upload to a generic provider).
publish:
  provider: generic
  url: https://oddfix.gbetss.com.br/downloads
