name: Release Desktop

# Push a tag like v0.1.0 to build the Windows installer and publish it (plus the
# auto-update metadata latest.yml) to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # nuxt build + electron-builder; publishes to GitHub Releases of this repo.
      - run: pnpm electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Backend origin baked into the build (GitHub repo secret). Not a secrecy
          # measure — keep auth/rate-limit on the backend.
          ODDFIX_BACKEND_URL: ${{ secrets.ODDFIX_BACKEND_URL }}
