name: Release Desktop

# Push a tag like v0.1.0 to build the Windows installer + auto-update metadata and
# upload everything to our own backend (/downloads). Nothing is published to GitHub.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Build installers + latest.yml (no GitHub publish — generic provider).
      - run: pnpm electron:build
        env:
          # Backend origin baked into the build. Not a secrecy measure — keep
          # auth/rate-limit on the backend.
          ODDFIX_BACKEND_URL: ${{ secrets.ODDFIX_BACKEND_URL }}

      # Upload artifacts to the backend (/downloads). The desktop updater + web
      # installer fetch them from there; the GitHub repo never appears in the app.
      - name: Upload to backend
        shell: pwsh
        env:
          UPLOAD_BASE: https://oddfix.gbetss.com.br/downloads/upload
          UPLOAD_TOKEN: ${{ secrets.UPDATES_UPLOAD_TOKEN }}
        run: |
          # Só os artefatos distribuíveis — NÃO o app descompactado (win-unpacked/OddFix.exe
          # tem 216MB e não é instalador) nem os arquivos internos/debug.
          $files = Get-ChildItem -Path dist-electron -Recurse -Include *.exe,*.yml,*.blockmap,*.7z |
            Where-Object { $_.FullName -notmatch '[\\/]win-unpacked[\\/]' -and $_.Name -notlike 'builder-*' }
          if (-not $files) { throw "no artifacts to upload" }
          foreach ($f in $files) {
            Write-Host "Uploading $($f.Name) ($([math]::Round($f.Length/1MB,1)) MB)"
            curl.exe -sS -f -X PUT "$env:UPLOAD_BASE/$($f.Name)" `
              -H "x-upload-token: $env:UPLOAD_TOKEN" `
              -H "Content-Type: application/octet-stream" `
              --data-binary "@$($f.FullName)"
            if ($LASTEXITCODE -ne 0) { throw "upload failed: $($f.Name)" }
          }
          Write-Host "All artifacts uploaded."
